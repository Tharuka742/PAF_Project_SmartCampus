# MongoDB and Google OAuth2 credentials 
# Server
server.port=8080

# Database
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/smartCampusDB}

# JWT
app.jwt.secret=${APP_JWT_SECRET:paf-secret-key-change-this-in-production-must-be-at-least-256-bits}
app.jwt.expiration=86400000
app.frontend.url=${APP_FRONTEND_URL:http://localhost:3002}

# CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:3002}

# OAuth2 Google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# Logging
logging.level.com.paf=DEBUG


